<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vortrags-Raumplan</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .app {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 16px;
    }

    select {
      width: 100%;
      font-size: 18px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      appearance: none;
      -webkit-appearance: none;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      border-radius: 16px;
      background: #eef6ff;
      border: 1px solid #bfdbfe;
      text-align: center;
    }

    .result-title {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .room {
      font-size: 28px;
      font-weight: 800;
      color: #1d4ed8;
    }

    .info {
      margin-top: 22px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.4;
      text-align: center;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:active {
      background: #1d4ed8;
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card">
      <h1>Vortrags-Raumplan</h1>
      <div class="subtitle">
        Vortrag auswählen und Raum anzeigen lassen
      </div>

      <label for="talkSelect">Vortrag auswählen</label>
      <select id="talkSelect" onchange="zeigeRaum()">
        <option value="">Bitte auswählen</option>
        <option value="1">Vortrag 1</option>
        <option value="2">Vortrag 2</option>
        <option value="3">Vortrag 3</option>
        <option value="4">Vortrag 4</option>
        <option value="5">Vortrag 5</option>
        <option value="6">Vortrag 6</option>
        <option value="7">Vortrag 7</option>
        <option value="8">Vortrag 8</option>
        <option value="9">Vortrag 9</option>
        <option value="10">Vortrag 10</option>
      </select>

      <div class="result" id="resultBox" style="display:none;">
        <div class="result-title">Zugeordneter Raum</div>
        <div class="room" id="roomOutput"></div>
      </div>

      <button onclick="zuruecksetzen()">Auswahl zurücksetzen</button>

      <div class="info">
        Vortrag 1–5 sind Raum 1 zugeordnet.<br>
        Vortrag 6–10 sind Raum 2 zugeordnet.
      </div>
    </div>
  </div>

  <script>
    function zeigeRaum() {
      const auswahl = document.getElementById("talkSelect").value;
      const resultBox = document.getElementById("resultBox");
      const roomOutput = document.getElementById("roomOutput");

      if (auswahl === "") {
        resultBox.style.display = "none";
        roomOutput.textContent = "";
        return;
      }

      const vortragNummer = parseInt(auswahl, 10);

      if (vortragNummer >= 1 && vortragNummer <= 5) {
        roomOutput.textContent = "Raum 1";
      } else if (vortragNummer >= 6 && vortragNummer <= 10) {
        roomOutput.textContent = "Raum 2";
      }

      resultBox.style.display = "block";
    }

    function zuruecksetzen() {
      document.getElementById("talkSelect").value = "";
      document.getElementById("resultBox").style.display = "none";
      document.getElementById("roomOutput").textContent = "";
    }
  </script>
</body>
</html>
