<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gebäude-Zustandsbewertung</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    background: #f4f6f8;
    color: #1f2937;
  }

  .app {
    max-width: 480px;
    margin: auto;
    padding: 16px;
  }

  h1 {
    font-size: 24px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 18px;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }

  label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    font-size: 17px;
    margin-bottom: 12px;
  }

  .trade-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .ratings {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  .rating-btn {
    padding: 12px 0;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #f9fafb;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }

  .rating-btn.active {
    background: #2563eb;
    color: white;
    border-color: #2563eb;
  }

  .result {
    font-size: 15px;
    background: #eef2ff;
    padding: 12px;
    border-radius: 12px;
  }

  .price {
    font-size: 20px;
    font-weight: 800;
    margin-top: 4px;
  }

  .total {
    background: #111827;
    color: white;
  }

  .total .price {
    font-size: 28px;
  }

  .hint {
    font-size: 13px;
    color: #6b7280;
    margin-top: 6px;
  }
</style>
</head>

<body>
<div class="app">

  <h1>Gebäude-Zustandsbewertung</h1>
  <div class="subtitle">Bewertung nach Schulnoten: 1 = sehr gut, 5 = dringend sanierungsbedürftig</div>

  <div class="card">
    <label for="area">Grundfläche Gebäude in m²</label>
    <input id="area" type="number" inputmode="decimal" placeholder="z. B. 600" value="600" oninput="calculateTotal()">

    <label for="year">Baujahr</label>
    <input id="year" type="number" inputmode="numeric" placeholder="z. B. 1975" value="1975">
  </div>

  <div id="trades"></div>

  <div class="card total">
    <div>Geschätzte Optimierungskosten gesamt</div>
    <div class="price" id="totalPrice">0 €</div>
    <div class="hint" style="color:#d1d5db;">
      Grobe Orientierung auf Basis Grundfläche und Zustandsnote.
    </div>
  </div>

</div>

<script>
const trades = [
  {
    name: "Türen / Hauseingang",
    base: 18,
    text: "Optimierung z. B. neue Haustür, Schließanlage, Brandschutztüren, Beschläge."
  },
  {
    name: "Treppenhaus",
    base: 22,
    text: "Optimierung z. B. Anstrich, Geländer, Beleuchtung, Bodenbeläge, Sicherheit."
  },
  {
    name: "Dach",
    base: 55,
    text: "Optimierung z. B. Dachwartung, Abdichtung, Dämmung, Rinnen, kleinere Sanierung."
  },
  {
    name: "Elektrik",
    base: 42,
    text: "Optimierung z. B. Zählerschrank, Leitungen, Unterverteilungen, Beleuchtung."
  },
  {
    name: "Wasserleitungen",
    base: 38,
    text: "Optimierung z. B. Steigleitungen, Absperrungen, Dämmung, Leitungserneuerung."
  }
];

let ratings = {};

function formatEuro(value) {
  return new Intl.NumberFormat("de-DE", {
    style: "currency",
    currency: "EUR",
    maximumFractionDigits: 0
  }).format(value);
}

function factorForRating(rating) {
  const factors = {
    1: 0,
    2: 0.25,
    3: 0.55,
    4: 0.85,
    5: 1.25
  };
  return factors[rating];
}

function priceForTrade(trade, rating) {
  const area = Number(document.getElementById("area").value) || 0;
  return area * trade.base * factorForRating(rating);
}

function setRating(index, rating) {
  ratings[index] = rating;

  document.querySelectorAll(`[data-trade="${index}"]`).forEach(btn => {
    btn.classList.remove("active");
  });

  document.querySelector(`[data-trade="${index}"][data-rating="${rating}"]`).classList.add("active");

  const price = priceForTrade(trades[index], rating);
  document.getElementById(`price-${index}`).innerText = formatEuro(price);

  calculateTotal();
}

function calculateTotal() {
  let total = 0;

  trades.forEach((trade, index) => {
    const rating = ratings[index] || 3;
    const price = priceForTrade(trade, rating);
    total += price;

    const priceElement = document.getElementById(`price-${index}`);
    if (priceElement) {
      priceElement.innerText = formatEuro(price);
    }
  });

  document.getElementById("totalPrice").innerText = formatEuro(total);
}

function renderTrades() {
  const container = document.getElementById("trades");

  trades.forEach((trade, index) => {
    ratings[index] = 3;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="trade-title">${trade.name}</div>

      <div class="ratings">
        ${[1,2,3,4,5].map(rating => `
          <button 
            class="rating-btn ${rating === 3 ? "active" : ""}"
            data-trade="${index}"
            data-rating="${rating}"
            onclick="setRating(${index}, ${rating})">
            ${rating}
          </button>
        `).join("")}
      </div>

      <div class="result">
        ${trade.text}
        <div class="price" id="price-${index}">0 €</div>
      </div>
    `;

    container.appendChild(card);
  });

  calculateTotal();
}

renderTrades();
</script>

</body>
</html>
